name: Notify Homepage

on:
  push:
    branches: [main]
    paths: [research.json]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger jayphen-homepage rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.HOMEPAGE_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/Jayphen/jayphen-homepage/dispatches \
            -d '{"event_type": "research-updated"}'
